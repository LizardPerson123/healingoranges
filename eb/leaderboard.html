<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard</title>
  <style id="dropdivStyle"></style>
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="dropdown.css">
  <link rel="icon" type="image/icon-x" href="ebola.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="dropdiv" style="position: absolute; top: 10px; left: 10px;">
    <div class="dropdown">
    <button class="dropbtn" id="dropText">Options</button>
      <div class="dropdown-content">
        <a class="altChange" href="javascript:ChangeMode()">Mode</a>
        <a class="altChange" href="index.html">Back To Game</a>
      </div>
    </div>
  </div>

  <div id="achiLists" style="position: absolute; top: 20px; right: 0px; display: flex; flex-direction: column; gap: 20px">
  
  </div>

  <div style="display: flex; flex-direction: column; align-items: center;" id="leaderboardOuter">
    <h1 style="font-size: 3em;">Leaderboard</h1>
    <div style="margin-bottom: 20px;">
      <button class="option altChange" style="margin-right: 1em; padding: 10px; padding-left: 30px; padding-right: 30px; margin-bottom: 10px;" onclick="setUpLeaderboard('normal')">Classic</button>
      <button class="option altChange" style="margin-right: 1em; padding: 10px; padding-left: 30px; padding-right: 30px; margin-bottom: 10px;" onclick="setUpLeaderboard('triple_ebola')">Triple Ebola</button>
      <button class="option altChange" style="padding: 10px; padding-left: 30px; padding-right: 30px;" onclick="setUpLeaderboard('time_attack')">Time Attack</button>
    </div>
    <div>
      <button class="option altChange" style="margin-right: 1em; padding: 10px; padding-left: 30px; padding-right: 30px;" onclick="loadMoreLeaderboard(1)">More</button>
      <button class="option altChange" style="padding: 10px; padding-left: 30px; padding-right: 30px;" onclick="loadMoreLeaderboard(-1)">Back</button>
    </div>
    <div id="leaderboard">

    </div>
  </div>
  <script src="index.js"></script>
  <script src="httphandler.js"></script>
  <script src="utility.js"></script>
  <script src="leaderboard.js"></script>
  <script src="rotextensions.js"></script>
  <script src="dropdown.js"></script>

</body>
</html>
